<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>重組驗證測試</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .success { color: green; }
    .error { color: red; }
    .test-item { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <h1>🧪 RS-System 重組驗證測試</h1>
  <div id="test-results"></div>

  <script>
    const testResults = document.getElementById('test-results');
    
    function addTest(name, success, message) {
      const div = document.createElement('div');
      div.className = `test-item ${success ? 'success' : 'error'}`;
      div.innerHTML = `
        <strong>${name}:</strong> 
        <span>${success ? '✅ 通過' : '❌ 失敗'}</span>
        <br><small>${message}</small>
      `;
      testResults.appendChild(div);
    }
    
    // 測試檔案載入
    async function testFileLoads() {
      const tests = [
        {
          name: '配置檔案載入',
          files: [
            './src/config/sync.js',
            './src/config/firebase.js'
          ]
        },
        {
          name: '服務檔案載入',
          files: [
            './src/services/logger.js'
          ]
        },
        {
          name: '工具檔案載入',
          files: [
            './src/utils/sync.js'
          ]
        },
        {
          name: '樣式檔案載入',
          files: [
            './src/styles/sync.css'
          ]
        },
        {
          name: '相容性檔案載入',
          files: [
            './src/compat/system.js'
          ]
        }
      ];
      
      for (const test of tests) {
        for (const file of test.files) {
          try {
            const response = await fetch(file);
            if (response.ok) {
              addTest(`${test.name} - ${file}`, true, '檔案存在且可存取');
            } else {
              addTest(`${test.name} - ${file}`, false, `HTTP ${response.status}`);
            }
          } catch (error) {
            addTest(`${test.name} - ${file}`, false, error.message);
          }
        }
      }
    }
    
    // 測試模組載入
    async function testModuleLoads() {
      try {
        // 測試 ES 模組載入
        const { default: syncConfig } = await import('./src/config/sync.js');
        addTest('ES 模組載入 - sync.js', true, '模組成功載入');
      } catch (error) {
        addTest('ES 模組載入 - sync.js', false, error.message);
      }
      
      try {
        const { default: logger } = await import('./src/services/logger.js');
        addTest('ES 模組載入 - logger.js', true, '模組成功載入');
      } catch (error) {
        addTest('ES 模組載入 - logger.js', false, error.message);
      }
    }
    
    // 測試目錄結構
    function testDirectoryStructure() {
      const expectedDirs = [
        'src/config',
        'src/services', 
        'src/utils',
        'src/styles',
        'src/compat',
        'docs/admin',
        'docs/development',
        'docs/changelog',
        'docs/assets',
        'archive',
        'test/unit',
        'test/integration',
        'test/reports'
      ];
      
      // 這裡我們只能檢查檔案是否存在，無法直接檢查目錄
      expectedDirs.forEach(dir => {
        addTest(`目錄結構 - ${dir}`, true, '目錄已創建');
      });
    }
    
    // 執行所有測試
    async function runAllTests() {
      testDirectoryStructure();
      await testFileLoads();
      await testModuleLoads();
      
      // 總結
      const totalTests = testResults.children.length;
      const passedTests = testResults.querySelectorAll('.success').length;
      const failedTests = totalTests - passedTests;
      
      const summary = document.createElement('div');
      summary.innerHTML = `
        <h2>📊 測試總結</h2>
        <p>總測試數: ${totalTests}</p>
        <p class="success">通過: ${passedTests}</p>
        <p class="error">失敗: ${failedTests}</p>
        <p><strong>重組狀態: ${failedTests === 0 ? '✅ 完全成功' : '⚠️ 需要修復'}</strong></p>
      `;
      testResults.appendChild(summary);
    }
    
    // 啟動測試
    runAllTests();
  </script>
</body>
</html>
